<!DOCTYPE html>
<html>
<head>
	<meta charset='utf-8'>
	<meta http-equiv='X-UA-Compatible' content='IE=edge'>
	<title>TEST PAGE</title>
</head>
<body>
	<h1> Heyo! </h1>

	<!-- A container to display the received data -->
	<pre id="output" style="border: 1px solid #ccc; padding: 10px; background-color: #f9f9f9; max-height: 300px; overflow-y: auto;"></pre>

	<!-- Button to trigger a backend function -->
	<button id="runFunctionBtn">Run Backend Function</button>

	<script>
		// WebSocket URL setup
		let url = `ws://${window.location.host}/playground/test/ws/socket-server/`;
		const testSocket = new WebSocket(url);

		// Reference to the output container
		const outputContainer = document.getElementById('output');

		// WebSocket message handler
		testSocket.onmessage = function(e) {
			// Append the received line to the output container
			outputContainer.textContent += e.data; // Add new line
		};

		// Button click to trigger a function on the backend
		document.getElementById('runFunctionBtn').addEventListener('click', function() {
			const message = 'PONG'; // Example message
			testSocket.send(message);
		});
	</script>
</body>
</html>
